<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NFD Internal Tools</title>
  <link rel="stylesheet" href="/styles.css?v=1" />
  <style>
    .tool-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-top:24px;
    }
    .tool-card{
      display:block;
      padding:20px;
      border:1px solid #ddd;
      border-radius:12px;
      text-decoration:none;
      color:inherit;
      background:#fff;
    }
    .tool-card h2{
      margin:0 0 8px 0;
      font-size:20px;
    }
    .tool-card p{
      margin:0;
      opacity:.75;
      line-height:1.4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;">
      <div class="nfd-brand">
        <img class="nfd-logo" src="https://nakedandfamousdenim.com/cdn/shop/files/n_f_logo_letters_1b6077a8-7f47-47d5-aa91-7838e7c2f18f.png?v=1742515519&width=280" alt="Naked & Famous Denim">
      </div>
      <h1 style="margin:0;">Internal Tools</h1>
    </div>

    <div class="tool-grid">
      <a class="tool-card" href="/index.html">
        <h2>Size Chart Editor</h2>
        <p>Create and edit size charts.</p>
      </a>

      <a class="tool-card" href="/audit.html">
        <h2>Size Chart Audit</h2>
        <p>Review linked charts, orphan charts, and recent updates.</p>
      </a>

      <a class="tool-card" href="/image-import.html">
        <h2>Image Import</h2>
        <p>Upload and import product images.</p>
      </a>

      <a class="tool-card" href="/bis.html">
        <h2>Back in Stock Requests</h2>
        <p>Search, filter, and review BIS requests.</p>
      </a>
    </div>
  </div>
</body>
</html>
