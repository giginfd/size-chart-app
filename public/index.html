<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Size Chart Editor</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;">
  <h1 style="margin:0;">Size Chart Editor</h1>
  <a class="nfd-link" href="/audit.html">Go to Audit</a>
  <button id="copyOpen" type="button" class="nfd-link" style="border:0;background:transparent;cursor:pointer;text-decoration:underline;">Copy to another SKU</button>
</div>

    <p class="hint"><a href="/image-import.html">Go to Image Import</a></p>

    <div class="row">
      <label>SKU Tag</label>
      <div class="skuRow">
        <span class="skuPrefix">__</span>
        <input id="skuTag" placeholder="101110006" />
      </div>
    </div>

    <div class="row">
      <label>Template</label>
      <select id="template"></select>
    </div>

    <div class="row">
      <label>Chart name</label>
      <input id="chartName" placeholder="Optional (defaults to SKU or template)" />
    </div>

    <div class="row split">
      <div>
        <label>Sizes</label>
        <input id="sizes" placeholder="Leave blank for template sizes, or paste: 27,28,29,30" />
        <div class="hint">Leave blank to use template sizes. Or paste any list.</div>
      </div>
      <div>
        <label>Footer (optional)</label>
        <input id="footer" placeholder="Optional" />
      </div>
    </div>

    <div class="paste">
      <label>Paste table (optional)</label>
      <textarea id="paste" placeholder="Paste a full table block here (tabs or CSV). Click Parse to fill grid."></textarea>
      <button id="parseBtn" type="button">Parse</button>
    </div>

    <div id="grid"></div>

    <div class="actions">
      <button id="saveBtn" type="button">Save to Shopify</button>
      <div id="status"></div>
    </div>
  </div>

  <script src="/app.js"></script>

<!-- Copy chart modal -->
<div class="nfd-modal" id="copyModal" hidden>
  <div class="nfd-modal__backdrop" data-copy-close></div>
  <div class="nfd-modal__panel" role="dialog" aria-modal="true" aria-label="Copy size chart">
    <div class="nfd-modal__header">
      <div class="nfd-modal__title">Copy to another SKU</div>
      <button type="button" class="nfd-modal__close" data-copy-close aria-label="Close">✕</button>
    </div>

    <div class="row">
      <label>New SKU Tag</label>
      <input id="copySku" placeholder="__011496" />
      <div class="hint">Required. Must be unique.</div>
    </div>

    <div class="row">
      <label>New Chart Name</label>
      <input id="copyName" placeholder="Men's Slim Crew" />
      <div class="hint">Required.</div>
    </div>

    <div class="actions">
      <button id="copyConfirm" type="button">Create Copy</button>
      <div id="copyStatus" class="nfd-status"></div>
    </div>
  </div>
</div>

</body>
</html>
