<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image Import</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <h1>Image Import</h1>

    <div class="hint">
      Upload JPEGs named like 320139266_A.jpg.
      We will match the product by variant SKU starting with that number.
    </div>

    <div class="row">
      <input id="fileInput" type="file" accept=".jpg,.jpeg" multiple />
    </div>

    <div class="actions">
      <button id="uploadBtn" type="button">Import Images</button>
      <div id="status"></div>
    </div>

    <pre id="log" style="margin-top:14px; white-space:pre-wrap;"></pre>
  </div>

  <script src="/image-import.js"></script>
</body>
</html>
